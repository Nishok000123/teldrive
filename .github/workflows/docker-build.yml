name: Build Teldrive Custom

on:
  push:
    branches: [ main ] # This triggers the build every time you push code to GitHub

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # IMPORTANT: Your username 'Nishok000123' must be lowercase here
          tags: ghcr.io/nishok000123/teldrive:latest
          # This uses GitHub's cache to make future builds even faster
          cache-from: type=gha
          cache-to: type=gha,mode=max
