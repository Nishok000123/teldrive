name: Goreleaser

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.8.4). Leave empty to use current VERSION file."
        required: false
        default: ""

permissions: write-all

jobs:
  create-tag:
    name: Create release tag
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          elif [ -f VERSION ]; then
            VERSION=$(cat VERSION)
          else
            echo "Error: no version provided and VERSION file not found."
            exit 1
          fi
          if [ -z "$VERSION" ]; then
            echo "Error: version is empty."
            exit 1
          fi
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Error: tag '$VERSION' already exists. Provide a new version."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          CURRENT=$(cat VERSION 2>/dev/null || echo "")
          if [ "$CURRENT" != "$VERSION" ]; then
            echo "$VERSION" > VERSION
            git add VERSION
            git commit -m "Version $VERSION"
            git push origin HEAD
          fi
          git tag "$VERSION"
          git push origin "$VERSION"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  goreleaser:
    name: Release
    needs: [create-tag]
    if: >-
      always() && !cancelled() &&
      (github.event_name == 'push' || needs.create-tag.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
